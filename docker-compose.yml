version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis_password
      POSTGRES_DB: jarvis2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Store
  chromadb:
    image: chromadb/chroma:latest
    container_name: jarvis-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # Ollama (Local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # JARVIS API Server (uncomment when ready)
  # jarvis-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: jarvis-api
  #   ports:
  #     - "8080:8000"
  #   environment:
  #     - DATABASE_URL=postgresql://jarvis:jarvis_password@postgres:5432/jarvis2
  #     - REDIS_URL=redis://redis:6379/0
  #     - CHROMA_HOST=chromadb
  #     - CHROMA_PORT=8000
  #     - OLLAMA_BASE_URL=http://ollama:11434
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     chromadb:
  #       condition: service_started
  #   volumes:
  #     - ./src:/app/src
  #     - ./config:/app/config
  #     - ./user_data:/app/user_data

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  ollama_data:
